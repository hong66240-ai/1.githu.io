<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store - Shop</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=63996&format=png&color=000000" type="image/png">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="Home.html" class="logo">Online Store</a>
            <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav-links">
                <a href="Home.html" class="Home">Home</a>
                <a href="About.html" class="About">About</a>
                <a href="Shop.html" class="Shop active">Shop</a>
                <a href="Contact.html" class="Contact">Contact</a>
            </nav>
        </div>
    </header>

    <main class="shop-container">
        <!-- Item Card 1 -->
        <article class="card">
            <div class="top">
                <img class="img" src="./Img/iphone17.jpg">
            </div>
            <div class="card-body">
                <h3 class="name">iPhone 17</h3>
                <p class="price">$1399</p>
                <button class="btn">Add to Cart</button>
            </div>
        </article>

        <!-- Item Card 2 -->
        <article class="card">
            <div class="top">
                <img class="img" src="./Img/Watch Luxury.png" >
            </div>
            <div class="card-body">
                <h3 class="name">Watch Luxury</h3>
                <p class="price">$599</p>
                <button class="btn">Add to Cart</button>
            </div>
        </article>

        <!-- Item Card 3 -->
        <article class="card">
            <div class="top">
                <img class="img" src="./Img/Brand LV.jpg" >
            </div>
            <div class="card-body">
                <h3 class="name">LV</h3>
                <p class="price">$1999</p>
                <button class="btn">Add to Cart</button>
            </div>
        </article>

        <!-- Item Card 4 -->
        <article class="card">
            <div class="top">
                <img class="img" src="./Img/Ipad.png" >
            </div>
            <div class="card-body">
                <h3 class="name">iPad</h3>
                <p class="price">$399</p>
                <button class="btn">Add to Cart</button>
            </div>
        </article>
</body>
</html>
